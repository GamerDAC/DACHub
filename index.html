<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DACHub</title>

<style>
body {
    margin: 0;
    background: #0c0c0c;
    color: white;
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
}

/* BACKGROUND */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    filter: blur(40px) brightness(0.35);
    z-index: -1;
    transition: 0.3s;
}

/* TOP BAR */
#topbar {
    padding: 20px 60px;
    font-size: 22px;
    font-weight: 600;
}

/* ROW */
.row {
    margin: 25px 0;
}

.row h2 {
    margin-left: 60px;
    font-weight: 500;
    opacity: 0.8;
}

/* ROW CONTAINER */
.row-container {
    display: flex;
    gap: 12px;
    padding: 10px 60px;
    overflow: hidden;
}

/* TILE */
.tile {
    min-width: 260px;
    height: 150px;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: #1a1a1a;
    transition: transform 0.12s linear;
}

.tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* TITLE */
.tile-info {
    position: absolute;
    bottom: 0;
    padding: 10px;
    font-size: 14px;
    width: 100%;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

/* FOCUS */
.tile.focused {
    transform: scale(1.05);
    z-index: 2;
}

.tile.focused::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    height: 5px;
    width: 100%;
    background: #107C10;
}

/* GAME VIEW */
#gameView {
    position: fixed;
    inset: 0;
    display: none;
    background: black;
}

#gameFrame {
    width: 100%;
    height: 100%;
    border: none;
}

#guide.open {
    left: 0;
}

.guide-item {
    padding: 14px;
    font-size: 18px;
    margin-bottom: 10px;
    border-radius: 6px;
}

.guide-item:hover {
    background: rgba(255,255,255,0.08);
}

* {
    user-select: none;
}

/* BUTTON HINTS */
#hints {
    position: fixed;
    bottom: 20px;
    right: 40px;
    font-size: 14px;
    opacity: 0.7;
}

/* GLOW EFFECT */
.tile.focused {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(16,124,16,0.7);
}

/* SUBTLE ANIMATION */
.tile {
    transition: transform 0.12s, box-shadow 0.2s;
}

/* IDLE FLOAT */
.tile.focused {
    animation: pulse 1.8s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1.06); }
    to { transform: scale(1.09); }
}

#toastContainer {
    position: fixed;
    bottom: 40px;
    right: 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
}

.toast {
    background: rgba(20,20,20,0.95);
    border-left: 4px solid #107C10;
    padding: 14px 18px;
    border-radius: 6px;
    min-width: 220px;
    font-size: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    animation: slideIn 0.25s ease, fadeOut 0.3s ease forwards;
    animation-delay: 0s, 3s;
}

.toast.error {
    border-left-color: #d13438;
}

@keyframes slideIn {
    from {
        transform: translateX(40px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateX(40px);
    }
}

</style>
</head>

/* BUILD UI */
function buildUI() {
    const app = document.getElementById("app");

    data.forEach(row => {
        const section = document.createElement("div");
        section.className = "row";

        const title = document.createElement("h2");
        title.textContent = row.title;

        const container = document.createElement("div");
        container.className = "row-container";

        row.games.forEach(g => {
            const tile = document.createElement("div");
            tile.className = "tile";

            tile.innerHTML = `
                <img src="${g.img}">
                <div class="tile-info">${g.name}</div>
            `;

            tile.dataset.img = g.img;
            tile.dataset.url = g.url;

            container.appendChild(tile);
        });

        section.appendChild(title);
        section.appendChild(container);
        app.appendChild(section);
    });

    rows = document.querySelectorAll(".row-container");
    updateFocus();
}

/* FOCUS */
function updateFocus() {
    document.querySelectorAll(".tile").forEach(t => t.classList.remove("focused"));

    const row = rows[focus.row];
    if (!row) return;

    const tile = row.children[focus.col];
    if (!tile) return;

    tile.classList.add("focused");

    row.scrollTo({
        left: tile.offsetLeft - 200,
        behavior: "smooth"
    });

    document.getElementById("bg").style.backgroundImage =
        `url(${tile.dataset.img})`;
}

/* MOVE */
function canMove() {
    const now = Date.now();
    if (now - lastMove > MOVE_DELAY) {
        lastMove = now;
        moveSound.currentTime = 0;
        moveSound.play();
        return true;
    }
    return false;
}

function move(dx, dy) {
    if (!canMove()) return;

    focus.row = Math.max(0, Math.min(rows.length-1, focus.row + dy));

    const max = rows[focus.row].children.length - 1;
    focus.col = Math.max(0, Math.min(max, focus.col + dx));

    updateFocus();
}

function showToast(message, type = "default") {
    const container = document.getElementById("toastContainer");

    const toast = document.createElement("div");
    toast.className = "toast " + type;
    toast.textContent = message;

    container.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3300);
}

/* GAME */
let gamePopup = null;

function select() {
    const tile = rows[focus.row].children[focus.col];
    const url = tile.dataset.url;

    if (url === "invite") {
        sendInvite();
        return;
    }

    if (!url) {
        showToast("No game URL set!", "error");
        return;
    }

    showToast("Launching game...");
    selectSound.currentTime = 0;
    selectSound.play();

    // Open popup instead of iframe
    gamePopup = window.open(
        url,
        "gameWindow",
        "width=1280,height=720,resizable=no"
    );

    if (!gamePopup) {
        showToast("Popup blocked!", "error");
    }
}

function exitGame() {
    if (gamePopup && !gamePopup.closed) {
        gamePopup.close();
    }
}

function sendInvite() {
    const url = window.location.href;

    const subject = encodeURIComponent("Join me on DACHub!");
    const body = encodeURIComponent(
        "Hey!\n\nCome play games with me 🎮\n\n" + url
    );

    const mailto = `mailto:?subject=${subject}&body=${body}`;

    const link = document.createElement("a");
    link.href = mailto;
    document.body.appendChild(link);

    showToast("Opening email...");
    selectSound.currentTime = 0;
    selectSound.play();

    setTimeout(() => {
        link.click();

        // fallback after 2s
        setTimeout(() => {
            navigator.clipboard.writeText(url);
            showToast("Could not open email.", "error");
            showToast("Copied invite link!");
        }, 2000);

    }, 100);
}

/* KEYBOARD (unchanged) */
window.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") move(1,0);
    if(e.key==="ArrowLeft") move(-1,0);
    if(e.key==="ArrowDown") move(0,1);
    if(e.key==="ArrowUp") move(0,-1);
    if(e.key==="Enter") select();
    if(e.key==="Escape") exitGame();
});

/* 🎮 GAMEPAD SUPPORT */
let prevButtons = [];

function gamepadLoop() {
    const gamepads = navigator.getGamepads();
    const gp = gamepads[0];

    if (gp) {
        // AXIS (left stick)
        const x = gp.axes[0];
        const y = gp.axes[1];

        const DEADZONE = 0.6;

if (Math.abs(x) > DEADZONE) {
    if (Date.now() - lastMove > MOVE_DELAY) {
        move(x > 0 ? 1 : -1, 0);
    }
}

if (Math.abs(y) > DEADZONE) {
    if (Date.now() - lastMove > MOVE_DELAY) {
        move(0, y > 0 ? 1 : -1);
    }
}
        if (x < -0.5) move(-1,0);
        if (y > 0.5) move(0,1);
        if (y < -0.5) move(0,-1);

        // BUTTONS
        gp.buttons.forEach((btn, i) => {
            const pressed = btn.pressed;
            const wasPressed = prevButtons[i];

            if (pressed && !wasPressed) {
                // A button
                if (i === 0) select();

                // B button
                if (i === 1) exitGame();

                // D-Pad
                if (i === 14) move(-1,0);
                if (i === 15) move(1,0);
                if (i === 12) move(0,-1);
                if (i === 13) move(0,1);
            }

            prevButtons[i] = pressed;
        });
    }

    requestAnimationFrame(gamepadLoop);
}

/* INIT */
buildUI();
gamepadLoop();
</script>
